[theme]
# Light, clean theme with yellow accents
base = "light"
primaryColor = "#F2C94C"            # sunflower yellow for buttons/accents
backgroundColor = "#FFFFFF"          # main background white
secondaryBackgroundColor = "#FFF9E6" # very light pastel yellow (sidebar, widgets)
textColor = "#333333"                # dark gray text for readability
font = "sans serif"

